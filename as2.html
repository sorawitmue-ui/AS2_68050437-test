<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assignment 2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .hero {
      background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
      height: 100vh;
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .box {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    a {
      color: yellow;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="box">

    <h1>Assignment 2</h1>

    <!-- Tag p -->
    <p>Tag p ใช้สำหรับแสดงข้อความเป็นย่อหน้า</p>

    <!-- Tag a -->
    <p>
      <a href="https://www.google.com">ไปยัง Google</a>
    </p>

    <!-- Tag br -->
    <p>บรรทัดที่ 1 <br> บรรทัดที่ 2</p>

    <!-- Tag i -->
    <p><i>นี่คือข้อความตัวเอียง</i></p>

    <!-- Comment -->
    <!-- นี่คือคอมเมนต์ จะไม่แสดงบนเว็บ -->

  </div>
</div>

</html>
